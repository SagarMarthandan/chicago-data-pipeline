# Build & Push — runs when a PR is merged to dev (push to dev)
#
# Builds the three custom Docker images and pushes them to GHCR
# (GitHub Container Registry) tagged as `:dev`.
#
# No manually-configured secrets needed — GITHUB_TOKEN is auto-provided
# by GitHub Actions. The `permissions: packages: write` grants push access
# to GHCR.
#
# GHCR requires lowercase image paths. github.repository preserves case
# (e.g. "SagarMarthandan/chicago-data-pipeline"), so we lowercase it.

name: Build & Push

on:
  push:
    branches: [dev]

jobs:
  push-images:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name for GHCR
        run: echo "REPO_LC=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: docker compose build airflow-init spark-master dbt-build

      - name: Tag and push images
        run: |
          docker tag chicago-data-pipeline-airflow-init ghcr.io/${{ env.REPO_LC }}/airflow:dev
          docker tag chicago-data-pipeline-spark-master ghcr.io/${{ env.REPO_LC }}/spark:dev
          docker tag chicago-data-pipeline-dbt:latest ghcr.io/${{ env.REPO_LC }}/dbt:dev
          docker push ghcr.io/${{ env.REPO_LC }}/airflow:dev
          docker push ghcr.io/${{ env.REPO_LC }}/spark:dev
          docker push ghcr.io/${{ env.REPO_LC }}/dbt:dev
