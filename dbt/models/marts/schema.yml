version: 2

models:
  - name: dim_date
    description: "Date dimension spanning crime (2018-present) + Divvy trip (2020-present) dates. Phase 4.4."
    columns:
      - name: date_key
        description: "Date (no time) — PK for date dimension"
        tests:
          - unique
          - not_null
      - name: year
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2018
              max_value: 2026
      - name: month
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 12

  - name: dim_community_area
    description: "Chicago's 77 community areas. Static reference data loaded via dbt seed."
    columns:
      - name: community_area_id
        description: "Community area number (1-77). PK."
        tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 77
      - name: community_area_name
        tests:
          - not_null

  - name: dim_crime_type
    description: "Distinct primary_type + description combinations."
    columns:
      - name: crime_type_key
        description: "Surrogate key: primary_type || '|' || description"
        tests:
          - unique
          - not_null
      - name: primary_type
        tests:
          - not_null

  - name: fact_crime_events
    description: "Main crime fact table. One row per crime event with FKs to dimensions."
    columns:
      - name: crime_id
        description: "Primary key — unique crime case ID"
        tests:
          - unique
          - not_null
      - name: date_key
        description: "FK to dim_date"
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: community_area_id
        description: "FK to dim_community_area. 0 = unassigned (not in dim)."
        tests:
          - relationships:
              to: ref('dim_community_area')
              field: community_area_id
              # 0 = unassigned (not a real community area). Exclude from
              # referential integrity check so the test passes on valid FKs only.
              config:
                where: "community_area_id != 0"
      - name: crime_type_key
        description: "FK to dim_crime_type"
        tests:
          - not_null
          - relationships:
              to: ref('dim_crime_type')
              field: crime_type_key
      - name: latitude
        description: "Crime location latitude. Can be null."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 41.64
              max_value: 42.03
              config:
                where: "latitude IS NOT NULL"
      - name: longitude
        description: "Crime location longitude. Can be null."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -87.95
              max_value: -87.52
              config:
                where: "longitude IS NOT NULL"

  - name: fact_station_reads
    description: "Divvy station status fact table. One row per station poll (Kafka message). Analytics-ready for ridership/availability queries."
    columns:
      - name: station_id
        description: "Divvy station ID (text — mixed UUID + numeric). Part of the grain (station + reported_at)."
        tests:
          - not_null
      - name: reported_at
        description: "When the station last reported its status to GBFS. Part of the grain."
        tests:
          - not_null
      - name: date_key
        description: "FK to dim_date (date portion of reported_at)."
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: num_bikes_available
        description: "Standard bikes available at this station. Non-negative."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
      - name: num_docks_available
        description: "Docks available for returns. Non-negative."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
      - name: is_renting
        description: "Whether bikes can be rented. Boolean (cast from int 0/1 in Spark)."
        tests:
          - not_null
      - name: is_returning
        description: "Whether bikes can be returned. Boolean (cast from int 0/1 in Spark)."
        tests:
          - not_null
      - name: total_vehicles_available
        description: "Derived: bikes + ebikes + scooters available."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100


  - name: fact_divvy_trips
    description: "Divvy trip fact table. One row per trip. Partitioned by started_at, clustered by start_station_id. Phase 4.4."
    columns:
      - name: ride_id
        description: "Primary key — unique ride identifier"
        tests:
          - not_null
      - name: started_at
        description: "Trip start timestamp. Partition column."
        tests:
          - not_null
      - name: date_key
        description: "FK to dim_date (date portion of started_at)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: start_station_id
        description: "Start station ID. Cluster column. Can be null for dockless ebikes."
      - name: rideable_type
        description: "Bike type: classic_bike, electric_bike, etc."
      - name: trip_duration_seconds
        description: "Trip duration in seconds. Derived: ended_at - started_at."

  - name: dim_stations
    description: "Divvy station dimension extracted from trip data. One row per station with coordinates. Phase 4.4."
    columns:
      - name: station_id
        description: "Station ID (string — mixed UUID + numeric). PK."
        tests:
          - unique
          - not_null
      - name: station_name
        description: "Human-readable station name."
        tests:
          - not_null
      - name: lat
        description: "Station latitude."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 41.0
              max_value: 42.5
      - name: lng
        description: "Station longitude."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -88.5
              max_value: -87.0

  - name: fact_station_day
    description: "THE analytics mart. One row per station per day: trip_count + crime_count_within_quarter_mile. Geospatial join: crimes within 402m (0.25 mile) of station on same day. Phase 4.4."
    columns:
      - name: station_id
        description: "FK to dim_stations. Part of grain (station + date)."
        tests:
          - not_null
      - name: date_key
        description: "FK to dim_date. Part of grain. Partition column."
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: trip_count
        description: "Number of Divvy trips starting at this station on this day."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 10000
      - name: crime_count_within_quarter_mile
        description: "Number of crimes within 0.25 mile (402m) of this station on this day."
        tests:
          - not_null

  - name: crime_ridership_correlation
    description: "CORR(trip_count, crime_count_within_quarter_mile) at overall, per-station, and per-month scope. Answers the driving question. Phase 4.4."
    columns:
      - name: scope
        description: "Correlation scope: overall, per_station, or per_month."
        tests:
          - not_null
          - accepted_values:
              values: ['overall', 'per_station', 'per_month']
      - name: correlation_coefficient
        description: "Pearson correlation coefficient between trip_count and crime_count. Range: -1 to 1."
      - name: observation_count
        description: "Number of station-day observations used in the correlation."
        tests:
          - not_null