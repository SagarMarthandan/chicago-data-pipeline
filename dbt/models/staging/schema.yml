version: 2

sources:
  - name: raw
    schema: raw
    # Phase 4.3 — source is now BigQuery dataset `raw` (was Postgres schema).
    # The crime_events table is loaded by `bq load` from GCS Parquet.
    # station_status stays on local Postgres (streaming path). The source
    # definition is kept so stg_station_status + fact_station_reads can
    # compile, but they're excluded from dbt build via --exclude in the DAG
    # (the table doesn't exist in BigQuery). They'll be revisited in Phase 4.6.
    tables:
      - name: crime_events
        # Loaded by bq_load_crime Airflow task: GCS Parquet → BigQuery.
        # Columns match the Parquet schema from Spark (crime_batch.py):
        # id (long), case_number, date (timestamp), block, iucr,
        # primary_type, description, location_description, arrest (bool),
        # domestic (bool), beat, district (int), ward (int),
        # community_area (int), fbi_code, x_coordinate, y_coordinate,
        # year (int), updated_on (timestamp), latitude (double),
        # longitude (double)
      - name: station_status
        # Stays on local Postgres (streaming path). Not in BigQuery.
        # Source definition exists only so stg_station_status compiles.
      - name: divvy_trips
        # Phase 4.4 — loaded by dlt from S3 CSVs (divvy-tripdata.s3.amazonaws.com).
        # Monthly ZIPs 2020-04 onward. ~50M rows total.
        # Columns: ride_id, rideable_type, started_at, ended_at,
        # start_station_name, start_station_id, end_station_name,
        # end_station_id, start_lat, start_lng, end_lat, end_lng,
        # member_casual, source_month

  # Phase 4.4 — BigQuery public crime dataset (replaces Socrata extract)
  # This is the official Chicago PD crime dataset, 2001-present (~8.6M rows).
  # Referenced directly in DBT — no ingestion needed (free to query).
  # stg_crime_events now reads from this source instead of raw.crime_events.
  # The Socrata pipeline (crime_batch DAG) still loads raw.crime_events as a
  # fallback, but the analytics marts use the public dataset for full history.
  - name: chicago_crime_public
    database: bigquery-public-data
    schema: chicago_crime
    tables:
      - name: crime
        # Columns: unique_key (INT64 REQUIRED), case_number, date (TIMESTAMP),
        # block, iucr, primary_type, description, location_description,
        # arrest (BOOL), domestic (BOOL), beat, district, ward,
        # community_area, fbi_code, x_coordinate, y_coordinate, year,
        # updated_on (TIMESTAMP), latitude, longitude, location (GEOGRAPHY)

models:
  - name: stg_crime_events
    description: "Staging view on bigquery-public-data.chicago_crime.crime (Phase 4.4). Filters to 2018-present, deduplicates on unique_key."
    columns:
      - name: crime_id
        description: "Unique crime case ID — primary key"
        tests:
          - unique
          - not_null
      - name: occurred_at
        description: "When the crime occurred (timestamp)"
        tests:
          - not_null
      - name: primary_type
        description: "Crime category (THEFT, BATTERY, etc.)"
        tests:
          - not_null
      - name: community_area_id
        description: "FK to dim_community_area. 0 = unassigned."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 77
      - name: arrest
        description: "Whether an arrest was made. Postgres BOOLEAN — can only be true/false/null."
        tests:
          - not_null
      - name: domestic
        description: "Whether the crime was domestic-related. Postgres BOOLEAN — can only be true/false/null."
        tests:
          - not_null
      - name: latitude
        description: "Crime location latitude. Can be null (~0.8% of rows)."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 41.64
              max_value: 42.03
              config:
                where: "latitude IS NOT NULL"
      - name: longitude
        description: "Crime location longitude. Can be null (~0.8% of rows)."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -87.95
              max_value: -87.52
              config:
                where: "longitude IS NOT NULL"

  - name: stg_station_status
    description: "1:1 with raw.station_status. Renames columns (last_reported→reported_at, ingest_timestamp→ingested_at), casts types, deduplicates on Kafka coordinates."
    columns:
      - name: station_id
        description: "Divvy station ID (mixed UUID + numeric string). Stays text."
        tests:
          - not_null
      - name: reported_at
        description: "When the station last reported its status to GBFS (timestamp)."
        tests:
          - not_null
      - name: is_renting
        description: "Whether bikes can be rented at this station. Boolean (cast from int 0/1 in Spark)."
        tests:
          - not_null
      - name: is_returning
        description: "Whether bikes can be returned at this station. Boolean (cast from int 0/1 in Spark)."
        tests:
          - not_null
      - name: num_bikes_available
        description: "Number of standard bikes available. Non-negative integer."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
      - name: num_docks_available
        description: "Number of docks available for returns. Non-negative integer."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100


  - name: stg_divvy_trips
    description: "Staging view on raw.divvy_trips. Casts types, filters null ride_id/started_at. Phase 4.4."
    columns:
      - name: ride_id
        description: "Unique ride identifier. Primary key."
        tests:
          - not_null
      - name: started_at
        description: "Trip start timestamp."
        tests:
          - not_null
      - name: ended_at
        description: "Trip end timestamp."
      - name: rideable_type
        description: "Bike type: classic_bike, electric_bike, etc."
      - name: start_station_id
        description: "Start station ID (string). Can be null for ebikes without station."
      - name: start_lat
        description: "Start latitude. Can be null."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 41.0
              max_value: 42.5
              config:
                where: "start_lat IS NOT NULL"
      - name: start_lng
        description: "Start longitude. Can be null."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -88.5
              max_value: -87.0
              config:
                where: "start_lng IS NOT NULL"