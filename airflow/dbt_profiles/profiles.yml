# DBT Profiles for Airflow container (Phase 4.3 — BigQuery)
#
# This is a SEPARATE profiles.yml from dbt/profiles.yml (which uses the
# host's key file path). Inside the Airflow container, the key file is
# mounted at /opt/airflow/gcp-credentials.json (from docker-compose.yml).
#
# The DBT container (launched via `docker run --volumes-from <airflow>`)
# inherits this mount + the GOOGLE_APPLICATION_CREDENTIALS env var.
#
# Usage in DAG: dbt build --profiles-dir /opt/airflow/dbt_profiles

chicago_crime:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: chicago-divvy-pipeline
      dataset: staging  # default dataset — overridden per-model by dbt_project.yml
      threads: 4
      keyfile: /opt/airflow/gcp-credentials.json
      location: US
