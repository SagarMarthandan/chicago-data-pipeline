# ============================================================
# Docker Compose — Phase 1: Batch Foundation
# ============================================================
# Services: Postgres, Spark (master + worker), Airflow (init + webserver + scheduler)
# Kafka + Grafana are added in Phase 2 and 3 respectively.
#
# Before first run:
#   1. cp .env.example .env   (fill in real values)
#   2. docker compose build    (builds custom Airflow + Spark images)
#   3. docker compose up -d    (starts all services)
#
# After startup:
#   - Airflow UI:  http://localhost:8080  (admin / admin)
#   - Spark UI:    http://localhost:8180
#   - Postgres:    localhost:5432
# ============================================================


# --- YAML Anchor: shared Airflow config ---
# The &airflow-common anchor defines config shared across all 3 Airflow services.
# The <<: *airflow-common syntax in each service merges this block.
# This avoids repeating 10+ lines of env vars and volumes 3 times.
x-airflow-common: &airflow-common
  build:
    context: ./airflow
    args:
      DOCKER_GID: ${DOCKER_GID:-999}
  environment:
    # Executor — how Airflow runs tasks:
    #   LocalExecutor = parallel tasks on one machine, no extra services needed
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}

    # Metadata DB connection string.
    # Format: postgresql+psycopg2://<user>:<pass>@<host>:<port>/<db>
    # Uses psycopg2 driver (Python Postgres adapter).
    # Host is "postgres" (Docker service name, not localhost).
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}

    # Don't load Airflow's example DAGs — they clutter the UI
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}

    # New DAGs start unpaused (convenient for dev; in prod you'd want True)
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"

    # API server port (inside the container)
    # Airflow 3.0 change: moved from [webserver] section to [api] section
    AIRFLOW__API__PORT: ${AIRFLOW__API__PORT}

    # ============ Airflow 3.0 Authentication ============
    # Airflow 3.0 replaces Flask-AppBuilder (FAB) with SimpleAuthManager.
    # Breaking change from 2.x: `airflow users create` CLI is GONE.
    # Users are defined via env vars + passwords.json file.
    #
    # SIMPLE_AUTH_MANAGER_USERS — comma-separated username:role pairs
    # Roles: viewer, user, op, admin
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS}

    # Passwords file — JSON mapping of username → password
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE}

    # Postgres credentials — needed by dbt tasks (BashOperator) and
    # the ingestion script. Passed through from .env.
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    # Socrata app token — increases API rate limit from 1K to 10K req/hr.
    # Used by the ingestion script (download_crime.py).
    SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN}
    POSTGRES_DB: ${POSTGRES_DB}

    # Execution API server URL — the scheduler needs to reach the API server
    # to serialize DAGs. Inside the scheduler container, localhost:8080 is NOT
    # the API server (that's in the webserver container). Must use the Docker
    # service name. Airflow 3.0 uses this for DAG serialization + task execution.
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/

    # Internal API secret key — shared between webserver and scheduler for
    # mutual auth. Without this, the scheduler gets "Invalid auth token:
    # Signature verification failed" when trying to serialize DAGs.
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW__CORE__INTERNAL_API_SECRET_KEY}

    # JWT secret — shared between webserver and scheduler for execution API auth.
    # Without this, each container generates its own random secret and JWT
    # signature verification fails ("Invalid auth token: Signature verification failed").
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}

    # Webserver secret key — shared for session signing.
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}

  volumes:
    # DAG files — bind mount so edits on host appear immediately in container
    - ./airflow/dags:/opt/airflow/dags

    # Task logs — named volume (persists across container rebuilds)
    - airflow_logs:/opt/airflow/logs

    # Spark jobs — mounted so DockerOperator can reference them
    - ./spark/jobs:/opt/spark/jobs
    # Data directory — Parquet files from ingestion, accessible to Airflow tasks
    - ./data:/opt/airflow/data

    # Docker socket — lets DockerOperator spawn containers from inside Airflow
    # Without this, DockerOperator can't talk to the Docker daemon
    - /var/run/docker.sock:/var/run/docker.sock

    # Airflow 3.0 SimpleAuthManager — passwords file
    # JSON mapping of username → password (e.g., {"admin": "admin"})
    - ./airflow/passwords.json:/opt/airflow/config/passwords.json

    # Ingestion scripts — mounted so BashOperator can run download_crime.py
    # Path: /opt/airflow/ingestion → __file__ parent.parent = /opt/airflow
    # → DATA_DIR resolves to /opt/airflow/data/raw/crime (matches data mount)
    - ./ingestion:/opt/airflow/ingestion

    # DBT project — mounted so BashOperator can run dbt commands
    - ./dbt:/opt/airflow/dbt

    # DBT profiles for Airflow container (host: postgres, not localhost)
    - ./airflow/dbt_profiles:/opt/airflow/dbt_profiles


services:

  # ============ Postgres ============
  # One instance, two databases:
  #   chicago_analytics  — warehouse (raw + staging + mart schemas)
  #   airflow_metadata   — Airflow internal state (DAG runs, task status, XComs)
  #
  # init.sql creates the schemas, airflow user, and airflow_metadata DB
  # on first startup (when the data volume is empty).
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # Named volume — data survives container rebuilds
      - postgres_data:/var/lib/postgresql/data
      # Init script — runs only on first startup (empty volume)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      # pg_isready checks if Postgres is accepting connections
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ============ Spark ============
  # Master + worker architecture:
  #   spark-master  — receives jobs, distributes work to workers, tracks status
  #   spark-worker  — executes tasks, reports results to master
  #
  # Both use the same custom image (spark/Dockerfile) which adds the
  # PostgreSQL JDBC driver to the apache/spark:3.5.1 base.
  #
  # Note: We switched from bitnami/spark to apache/spark because
  # Bitnami moved their images behind a commercial subscription in 2026.
  # The official apache/spark image uses spark-class commands instead
  # of Bitnami's SPARK_MODE env var interface.
  spark-master:
    build: ./spark
    restart: unless-stopped
    environment:
      # SPARK_MASTER_HOST tells the master what hostname to advertise to workers.
      # Without this, the master advertises a random container hostname that
      # workers can't resolve. Setting it to the Docker service name ensures
      # workers can connect back via spark://spark-master:7077.
      SPARK_MASTER_HOST: spark-master
      # Postgres credentials — needed by spark-submit jobs that write via JDBC.
      # Passed through from .env so they're never hardcoded in the job script.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    # Official apache/spark uses spark-class to start master/worker directly.
    # Bitnami's SPARK_MODE=master env var doesn't exist in the official image.
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      # Spark master Web UI — remapped to 8180 because 8080 is Airflow
      - "8180:8080"
      # Spark master RPC — workers connect via spark://spark-master:7077
      - "7077:7077"
    volumes:
      # Spark jobs — mounted for direct testing (spark-submit from master)
      - ./spark/jobs:/opt/spark/jobs
      # Data directory — Parquet files from ingestion are read by Spark
      - ./data:/opt/spark/data
    healthcheck:
      # Check if Spark master Web UI is responding on port 8080.
      # We check the Web UI (not the RPC port 7077) because Spark master
      # binds the RPC port to the container's Docker network IP (e.g., 172.18.0.2),
      # NOT to 127.0.0.1. The Web UI binds to 0.0.0.0 (all interfaces),
      # so it's reachable from localhost inside the container.
      # Uses python3 (available in apache/spark image for PySpark).
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8080)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  spark-worker:
    build: ./spark
    restart: unless-stopped
    environment:
      # Worker resource limits — read by spark-class startup scripts
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2G
      # Postgres credentials — needed when executors write via JDBC in
      # cluster mode. Passed through from .env, same as spark-master.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    # Worker connects to master via spark://spark-master:7077
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      # Spark worker Web UI
      - "8081:8081"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      # Data directory — Parquet files from ingestion are read by Spark
      - ./data:/opt/spark/data

  # ============ Airflow 3.0 ============
  # Three services from one image (airflow/Dockerfile):
  #
  #   airflow-init      — one-shot: runs db migrations, then exits
  #   airflow-webserver — serves the UI (port 8080)
  #   airflow-scheduler — schedules and executes tasks
  #
  # Airflow 3.0 change: no `airflow users create` command.
  # Users are defined via SimpleAuthManager env vars + passwords.json.
  # airflow-init only runs `airflow db migrate` now.
  #
  # webserver + scheduler wait for airflow-init to complete successfully
  # before starting (depends_on: condition: service_completed_successfully).

  airflow-init:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
    # One-shot command: migrate metadata DB only.
    # In Airflow 2.x, this also created the admin user via `airflow users create`.
    # In Airflow 3.0, users are defined via SimpleAuthManager env vars + passwords.json.
    command: >
      bash -c "
      airflow db migrate
      "
  airflow-webserver:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    # Airflow 3.0 change: `airflow webserver` command is GONE.
    # Replaced by `airflow api-server` — the API server now serves the web UI too.
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      # Airflow 3.0 health endpoint: /api/v2/monitor/health (not /health)
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/api/v2/monitor/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      # start_period gives Airflow time to boot before healthcheck counts
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    # Airflow 3.0: explicit command needed (image has no default CMD)
    command: scheduler

  # Airflow 3.0: DAG processing is now a separate component, not embedded
  # in the scheduler. Without this service, DAGs are never parsed/serialized
  # and the scheduler can't find them in the serialized_dag table.
  airflow-dag-processor:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: dag-processor


  # ============ DBT (build-only) ============
  # This service is never started — it exists only so `docker compose build`
  # builds the dbt image. The DAG runs it on-demand via `docker run --rm`.
  # Separated from Airflow because dbt-core 1.11 requires protobuf >=6.0
  # which conflicts with Airflow 3.0's protobuf 4.x pin.
  dbt-build:
    build: ./dbt
    image: chicago-data-pipeline-dbt:latest
    command: ["echo", "build-only service — not meant to run"]

# ============ Named Volumes ============
# Named volumes persist data across container rebuilds.
# Without these, `docker compose down` destroys all data.
volumes:
  postgres_data:
  airflow_logs:
