# ============================================================
# Grafana datasource provisioning — BigQuery (Phase 4.4)
# ============================================================
# Auto-creates the BigQuery datasource on Grafana startup.
# Used by dashboard panels that query BigQuery marts.
#
# Auth: JWT (service account). The plugin expects three fields:
#   jsonData.clientEmail  — service account client_email
#   jsonData.tokenUri     — service account token_uri
#   secureJsonData.privateKey — PEM private key (NOT the whole JSON file)
#
# The "gce" auth type only works on actual GCP VMs (metadata server).
#
# The uid "bigquery-analytics" is what dashboard panels reference
# via the "datasource.uid" field in their JSON.
# ============================================================

apiVersion: 1

datasources:
  - name: BigQuery Analytics
    uid: bigquery-analytics
    type: grafana-bigquery-datasource
    access: proxy
    jsonData:
      authenticationType: jwt
      project: chicago-divvy-pipeline
      defaultDataset: mart
      location: US
      clientEmail: terraform-runner@chicago-divvy-pipeline.iam.gserviceaccount.com
      tokenUri: https://oauth2.googleapis.com/token
    secureJsonData:
