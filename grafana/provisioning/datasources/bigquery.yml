# ============================================================
# Grafana datasource provisioning — BigQuery (Phase 4.4)
# ============================================================
# Auto-creates the BigQuery datasource on Grafana startup.
# Used by the crime-ridership analysis dashboard panels that query
# BigQuery marts (fact_station_day, crime_ridership_correlation).
#
# Auth: service account key file mounted at /opt/grafana/gcp-credentials.json
# (read-only mount from docker-compose.yml).
#
# The uid "bigquery-analytics" is what dashboard panels reference
# via the "datasource.uid" field in their JSON.
# ============================================================

apiVersion: 1

datasources:
  - name: BigQuery Analytics
    uid: bigquery-analytics
    type: grafana-bigquery-datasource
    access: proxy
    jsonData:
      authenticationType: gce
      # GCP project ID — interpolated from env var
      project: ${GCP_PROJECT_ID}
      # Default dataset for queries
      defaultDataset: mart
      # Location matches our BigQuery datasets
      location: US
      # Service account key file path (mounted in container)
      privateKeyPath: /opt/grafana/gcp-credentials.json
    isDefault: false
    editable: true
